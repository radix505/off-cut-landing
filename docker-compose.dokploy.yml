services:
  app:
    build:
      context: .
      args:
        VITE_GTM_ID: ${VITE_GTM_ID:-}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in Dokploy env (points at server-managed Postgres)}
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3001"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_MANAGER_IDS: ${TELEGRAM_MANAGER_IDS:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-}
      MAIL_REPLY_TO: ${MAIL_REPLY_TO:-}
      MAIL_DRY_RUN: ${MAIL_DRY_RUN:-}
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

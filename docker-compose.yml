services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: offcut
      POSTGRES_PASSWORD: offcut
      POSTGRES_DB: offcut
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U offcut -d offcut"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://offcut:offcut@postgres:5432/offcut}
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: "3001"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_MANAGER_IDS: ${TELEGRAM_MANAGER_IDS:-}
    ports:
      - "5173:5173"   # Vite dev server (open this URL in the browser)
      - "3001:3001"   # Fastify API (Vite proxies /api/* here)
    volumes:
      - .:/app:cached         # live source — HMR picks up changes
      - /app/node_modules     # mask host node_modules with container-installed deps
    command: npm run dev:all
    networks:
      - default
      - dokploy-network

volumes:
  postgres-data:

networks:
  dokploy-network:
    external: true

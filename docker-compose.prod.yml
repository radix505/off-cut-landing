services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: offcut
      POSTGRES_PASSWORD: offcut
      POSTGRES_DB: offcut
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U offcut -d offcut"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      args:
        # Vite bakes VITE_* into the static bundle at build time. Dokploy
        # forwards repo env vars to compose, which forwards them as
        # build-args, which the Dockerfile re-exports as ENV before
        # `npm run build`.
        VITE_GTM_ID: ${VITE_GTM_ID:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://offcut:offcut@postgres:5432/offcut}
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3001"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_MANAGER_IDS: ${TELEGRAM_MANAGER_IDS:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-}
      MAIL_REPLY_TO: ${MAIL_REPLY_TO:-}
      MAIL_DRY_RUN: ${MAIL_DRY_RUN:-}
    ports:
      - "3001:3001"
    networks:
      - default
      - dokploy-network

volumes:
  postgres-data:

networks:
  dokploy-network:
    external: true

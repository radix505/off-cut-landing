services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: offcut
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: offcut
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U offcut -d offcut"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      args:
        VITE_GTM_ID: ${VITE_GTM_ID:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://offcut:${POSTGRES_PASSWORD}@postgres:5432/offcut
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3001"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_MANAGER_IDS: ${TELEGRAM_MANAGER_IDS:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-}
      MAIL_REPLY_TO: ${MAIL_REPLY_TO:-}
      MAIL_DRY_RUN: ${MAIL_DRY_RUN:-}

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      RETENTION_DAYS: "14"
    volumes:
      - ./backups:/backups
    command:
      - sh
      - -c
      - |
        set -eu
        while true; do
          ts=$$(date +%Y%m%d-%H%M%S)
          if pg_dump -h postgres -U offcut -d offcut -F c -f /backups/offcut-$$ts.dump; then
            echo "[backup] wrote /backups/offcut-$$ts.dump"
          else
            echo "[backup] FAILED at $$ts" >&2
          fi
          find /backups -type f -name 'offcut-*.dump' -mtime +$$RETENTION_DAYS -delete || true
          sleep 86400
        done

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
